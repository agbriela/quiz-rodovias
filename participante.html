<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Quiz Desafio Mestres da Rodovia"
    >

    <title>Desafio Mestres da Rodovia</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >
</head>

<body>

    <main class="container">

        <p class="painel-label">
            Desafio Mestres da Rodovia
        </p>

        <h1>
            Quiz Ciclo de Vida do CAPEX
        </h1>

        <div class="progress">
            <div
                class="progress-bar"
                id="barra"
            ></div>
        </div>

        <section id="quiz">

            <h2 id="pergunta">
                Aguardando o início da pergunta...
            </h2>

            <div
                id="timer"
                aria-label="Tempo restante"
            >
                20
            </div>

            <div
                id="alternativas"
                aria-label="Alternativas da pergunta"
            ></div>

        </section>

        <p
            id="mensagemParticipante"
            class="mensagem-painel"
        ></p>

    </main>

    <script
        type="module"
        src="js/participante.js"
    ></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Desafio Logo aqui Logo lá</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >
</head>

<body>

    <main class="container participante-container">

        <!-- SALA DE ESPERA -->
        <section
            id="salaEspera"
            class="sala-espera"
        >
            <div class="icone-espera">
                🚧
            </div>

            <p class="painel-label">
                Sala de espera
            </p>

            <h1>
                Desafio Mestres da Rodovia
            </h1>

            <p class="texto-espera">
                Você já está conectado ao jogo.
            </p>

            <div class="participante-logado">
                <span>Participante</span>

                <strong id="nomeParticipante">
                    Carregando...
                </strong>

                <small id="equipeParticipante"></small>
            </div>

            <div class="animacao-espera">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <p class="mensagem-espera">
                Aguarde o apresentador iniciar o quiz.
            </p>
        </section>

        <!-- QUIZ -->
        <section
            id="areaQuiz"
            class="area-quiz oculto"
        >
            <p class="painel-label">
                Desafio Mestres da Rodovia
            </p>

            <h1>
                🚦 Quiz Rodoviário
            </h1>

            <div class="progress">
                <div
                    class="progress-bar"
                    id="barra"
                ></div>
            </div>

            <div id="quiz">

                <h2 id="pergunta">
                    Preparando pergunta...
                </h2>

                <div
                    id="timer"
                    aria-label="Tempo restante"
                >
                    45
                </div>

                <div id="alternativas"></div>

            </div>

            <p
                id="mensagemParticipante"
                class="mensagem-painel"
            ></p>
        </section>

    </main>

    <script
        type="module"
        src="js/participante.js"
    ></script>

</body>

</html>
